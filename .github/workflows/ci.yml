name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # ── 결정론적 검증 (Fail-fast) ──

      - name: Check Format (Prettier)
        run: npm run format:check

      - name: TypeScript 타입 검증
        run: npm run typecheck

      - name: ESLint (린팅 + FSD 아키텍처 검증)
        run: npm run lint

      - name: Stylelint (디자인 토큰 검증)
        run: npm run stylelint

      # ── 테스트 + Coverage ──

      - name: Unit tests + coverage (thresholds enforced)
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
          if-no-files-found: warn

      # ── 빌드 ──

      - name: Build Project
        run: npm run build
